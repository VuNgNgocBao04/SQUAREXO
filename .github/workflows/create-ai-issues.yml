- [ ] Test streak tăng đúng, reset khi bỏ ngày.
- [ ] Test NFT trigger chỉ xảy ra 1 lần.
- [ ] Test puzzle không trùng lặp trong tuần.

### Pha 5: Triển khai (Deployment)

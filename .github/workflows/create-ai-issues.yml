| Win Streak 3 | Chuỗi thắng 3 trận liên tiếp | Common Badge |
| Win Streak 5 | Chuỗi thắng 5 trận liên tiếp | Rare Badge |
| Win Streak 10 | Chuỗi thắng 10 trận liên tiếp | Epic Badge |

### 4.3. Milestone mastery
| Milestone | Mô tả | Phần thưởng |
|-----------|-------|-------------|
| Ladder Complete | Vượt đủ 5 bậc Challenge Ladder | Epic Frame |
| Weekly Champion | Hoàn tất 4 Weekly Trials liên tiếp | Epic Art Card |

name: Create AI Mode + Milestone + NFT Issues

on:
  push:
    branches:
      - copilot/add-ai-game-mode
    paths:
      - '.github/scripts/create-issues.js'
      - '.github/workflows/create-ai-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create all AI Mode + Milestone + NFT issues
        uses: actions/github-script@v7
        with:
          script-path: .github/scripts/create-issues.js

version: '3.9'
services:
  mongodb:
    image: mongo:7
    container_name: squarexo-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: squarexo-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/squarexo
      JWT_SECRET: replace-with-strong-secret
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      - mongodb
    ports:
      - '5000:5000'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: squarexo-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '5173:80'

volumes:
  mongo-data:
